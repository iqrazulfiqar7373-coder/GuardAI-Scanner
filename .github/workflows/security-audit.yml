name: GuardAI Security Automation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Missing Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install anthropic python-dotenv

    - name: Execute Dual-Layer Scanner
      run: |
        python scanner.py
